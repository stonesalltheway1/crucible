name: build-images

on:
  push:
    branches: [main]
    paths:
      - 'apps/cartographer/**'
      - 'services/shadow-recorder/**'
      - 'cth/grading/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: short SHA)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

# This is the focused image-build pipeline used while we bring up
# v1. The full release.yml still exists for tagged releases; this
# workflow runs on every push to main and produces a `:latest` tag
# plus a `:<short-sha>` tag for each Phase-8 service that's actually
# wired and tested.

jobs:
  cartographer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push cartographer
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/cartographer/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cartographer:latest
            ghcr.io/${{ github.repository_owner }}/cartographer:${{ steps.tag.outputs.tag }}
          cache-from: type=gha,scope=cartographer
          cache-to: type=gha,scope=cartographer,mode=max
          provenance: true
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/cartographer
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
