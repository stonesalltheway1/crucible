apiVersion: apps/v1
kind: Deployment
metadata:
  name: crucible-attestation-relay
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector: { matchLabels: { app.kubernetes.io/component: attestation-relay } }
  template:
    metadata: { labels: { app.kubernetes.io/component: attestation-relay } }
    spec:
      containers:
        - name: attestation-relay
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.image.name }}:{{ .Values.global.imageTag }}"
          ports: [{ name: http, containerPort: {{ .Values.service.port }} }]
          env:
            - { name: CRUCIBLE_RELAY_LISTEN, value: ":{{ .Values.service.port }}" }
            - { name: CRUCIBLE_REKOR_URL,    value: "{{ .Values.crucible.sigstore.rekorUrl }}" }
            - { name: CRUCIBLE_FULCIO_URL,   value: "{{ .Values.crucible.sigstore.fulcioUrl }}" }
            - name: CRUCIBLE_REKOR_SELF_HOSTED
              value: "{{ if eq .Values.crucible.sigstore.mode "self-hosted" }}1{{ else }}0{{ end }}"
          resources: {{ toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: crucible-attestation-relay
  namespace: {{ .Release.Namespace }}
spec:
  selector: { app.kubernetes.io/component: attestation-relay }
  ports: [{ port: {{ .Values.service.port }}, targetPort: http, name: http }]
