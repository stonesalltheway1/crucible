apiVersion: apps/v1
kind: Deployment
metadata:
  name: crucible-cartographer
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector: { matchLabels: { app.kubernetes.io/component: cartographer } }
  template:
    metadata: { labels: { app.kubernetes.io/component: cartographer } }
    spec:
      containers:
        - name: cartographer
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.image.name }}:{{ .Values.global.imageTag }}"
          ports: [{ name: http, containerPort: {{ .Values.service.port }} }]
          env:
            - { name: CRUCIBLE_CARTOGRAPHER_LISTEN, value: ":{{ .Values.service.port }}" }
            - { name: CRUCIBLE_DISTILLER_ADDR, value: "http://crucible-distiller.{{ .Release.Namespace }}.svc:8091" }
            - { name: CRUCIBLE_MEMORY_ROUTER_ADDR, value: "http://crucible-memory-router.{{ .Release.Namespace }}.svc:8090" }
            - { name: CRUCIBLE_OSS_DEFAULTS_DIR, value: "/etc/crucible/oss-defaults" }
          resources: {{ toYaml .Values.resources | nindent 12 }}
          livenessProbe: { httpGet: { path: /healthz, port: http } }
---
apiVersion: v1
kind: Service
metadata:
  name: crucible-cartographer
  namespace: {{ .Release.Namespace }}
spec:
  selector: { app.kubernetes.io/component: cartographer }
  ports: [{ port: {{ .Values.service.port }}, targetPort: http, name: http }]
