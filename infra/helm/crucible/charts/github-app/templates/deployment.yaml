apiVersion: apps/v1
kind: Deployment
metadata:
  name: crucible-github-app
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector: { matchLabels: { app.kubernetes.io/component: github-app } }
  template:
    metadata: { labels: { app.kubernetes.io/component: github-app } }
    spec:
      containers:
        - name: github-app
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.image.name }}:{{ .Values.global.imageTag }}"
          ports: [{ name: http, containerPort: {{ .Values.service.port }} }]
          env:
            - { name: CRUCIBLE_API_ADDR, value: "http://crucible-control-plane.{{ .Release.Namespace }}.svc:8080" }
            - name: GITHUB_APP_ID
              valueFrom: { secretKeyRef: { name: crucible-github-app, key: app_id } }
            - name: GITHUB_APP_PRIVATE_KEY_PATH
              value: /etc/crucible/github-app.pem
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom: { secretKeyRef: { name: crucible-github-app, key: webhook_secret } }
          volumeMounts:
            - { name: gh-app-pem, mountPath: /etc/crucible, readOnly: true }
          resources: {{ toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: gh-app-pem
          secret:
            secretName: crucible-github-app
            items:
              - { key: private_key, path: github-app.pem }
---
apiVersion: v1
kind: Service
metadata:
  name: crucible-github-app
  namespace: {{ .Release.Namespace }}
spec:
  selector: { app.kubernetes.io/component: github-app }
  ports: [{ port: {{ .Values.service.port }}, targetPort: http, name: http }]
