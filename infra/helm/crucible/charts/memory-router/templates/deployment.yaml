apiVersion: apps/v1
kind: Deployment
metadata:
  name: crucible-memory-router
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector: { matchLabels: { app.kubernetes.io/component: memory-router } }
  template:
    metadata: { labels: { app.kubernetes.io/component: memory-router } }
    spec:
      containers:
        - name: memory-router
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.image.name }}:{{ .Values.global.imageTag }}"
          ports: [{ name: http, containerPort: {{ .Values.service.port }} }]
          env:
            - name: CRUCIBLE_MEMORY_PG_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.crucible.postgres.credentialsSecret }}
                  key: dsn
            - { name: CRUCIBLE_FALKOR_ADDR, value: "{{ .Values.crucible.falkordb.host }}:{{ .Values.crucible.falkordb.port }}" }
            - { name: CRUCIBLE_REDIS_ADDR,  value: "{{ .Values.crucible.redis.host }}:{{ .Values.crucible.redis.port }}" }
          resources: {{ toYaml .Values.resources | nindent 12 }}
          readinessProbe: { httpGet: { path: /healthz, port: http } }
---
apiVersion: v1
kind: Service
metadata:
  name: crucible-memory-router
  namespace: {{ .Release.Namespace }}
spec:
  selector: { app.kubernetes.io/component: memory-router }
  ports: [{ port: {{ .Values.service.port }}, targetPort: http, name: http }]
