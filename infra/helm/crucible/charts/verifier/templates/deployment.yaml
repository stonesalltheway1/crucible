apiVersion: apps/v1
kind: Deployment
metadata:
  name: crucible-verifier
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector: { matchLabels: { app.kubernetes.io/component: verifier } }
  template:
    metadata: { labels: { app.kubernetes.io/component: verifier } }
    spec:
      containers:
        - name: verifier
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.image.name }}:{{ .Values.global.imageTag }}"
          ports: [{ name: http, containerPort: {{ .Values.service.port }} }]
          env:
            - { name: CRUCIBLE_VERIFIER_LISTEN_ADDR, value: ":{{ .Values.service.port }}" }
            - { name: CRUCIBLE_MEMORY_ROUTER_ADDR, value: "http://crucible-memory-router.{{ .Release.Namespace }}.svc:8090" }
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.crucible.llmRouting.apiKeysSecret }}
                  key: google
                  optional: true
          resources: {{ toYaml .Values.resources | nindent 12 }}
          livenessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 10 }
          readinessProbe: { httpGet: { path: /healthz, port: http } }
---
apiVersion: v1
kind: Service
metadata:
  name: crucible-verifier
  namespace: {{ .Release.Namespace }}
spec:
  selector: { app.kubernetes.io/component: verifier }
  ports: [{ port: {{ .Values.service.port }}, targetPort: http, name: http }]
