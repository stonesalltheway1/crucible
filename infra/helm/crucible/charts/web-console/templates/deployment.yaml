apiVersion: apps/v1
kind: Deployment
metadata:
  name: crucible-web-console
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector: { matchLabels: { app.kubernetes.io/component: web-console } }
  template:
    metadata: { labels: { app.kubernetes.io/component: web-console } }
    spec:
      containers:
        - name: web-console
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.image.name }}:{{ .Values.global.imageTag }}"
          ports: [{ name: http, containerPort: {{ .Values.service.port }} }]
          env:
            - { name: NEXT_PUBLIC_CRUCIBLE_API, value: "http://crucible-control-plane.{{ .Release.Namespace }}.svc:8080" }
            - { name: CRUCIBLE_SESSION_SECRET, valueFrom: { secretKeyRef: { name: "{{ .Values.crucible.auth.sessionSecret }}", key: secret } } }
          resources: {{ toYaml .Values.resources | nindent 12 }}
          livenessProbe: { httpGet: { path: /, port: http } }
---
apiVersion: v1
kind: Service
metadata:
  name: crucible-web-console
  namespace: {{ .Release.Namespace }}
spec:
  selector: { app.kubernetes.io/component: web-console }
  ports: [{ port: {{ .Values.service.port }}, targetPort: http, name: http }]
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crucible-web-console
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.global.domain }}
      http:
        paths:
          - { path: /, pathType: Prefix, backend: { service: { name: crucible-web-console, port: { number: {{ .Values.service.port }} } } } }
{{- end }}
