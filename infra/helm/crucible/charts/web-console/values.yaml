enabled: true
replicas: 2
image: { name: web-console }
service: { port: 3000 }
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: ""             # filled at install
      paths: [{ path: /, pathType: Prefix }]
  tls: []
resources:
  requests: { cpu: 500m, memory: 1Gi }
  limits:   { cpu: 2000m, memory: 4Gi }
