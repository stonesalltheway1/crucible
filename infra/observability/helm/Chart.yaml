apiVersion: v2
name: crucible-observability
description: |
  Crucible production observability umbrella: Prometheus, Grafana,
  Loki, Tempo, plus dashboards + alerts + status-page wiring.
type: application
version: 2026.6.0
appVersion: "2026.06.0"
dependencies:
  - name: kube-prometheus-stack
    version: 65.x
    repository: https://prometheus-community.github.io/helm-charts
    alias: prometheus
  - name: loki
    version: 6.x
    repository: https://grafana.github.io/helm-charts
  - name: tempo
    version: 1.x
    repository: https://grafana.github.io/helm-charts
