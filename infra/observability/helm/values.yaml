prometheus:
  prometheus:
    prometheusSpec:
      retention: 30d
      retentionSize: 100GiB
      ruleSelector: {}             # accept all PrometheusRule CRs
      serviceMonitorSelector: {}
      podMonitorSelector: {}
      scrapeInterval: 30s
      evaluationInterval: 30s
  grafana:
    enabled: true
    adminPassword: change-me
    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
        label: grafana_dashboard
      datasources:
        enabled: true
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'crucible'
            orgId: 1
            folder: 'Crucible'
            type: file
            disableDeletion: false
            updateIntervalSeconds: 30
            options:
              path: /var/lib/grafana/dashboards/crucible
    dashboards:
      crucible:
        per-task-economics:
          file: dashboards/01-per-task-economics.json
        verifier-health:
          file: dashboards/02-verifier-health.json
        safety-trust:
          file: dashboards/03-safety-trust.json
        memory-learning:
          file: dashboards/04-memory-learning.json
  alertmanager:
    enabled: true
    config:
      route:
        receiver: 'crucible-default'
        routes:
          - { match: { severity: 'critical' }, receiver: 'crucible-critical' }
          - { match: { severity: 'warning'  }, receiver: 'crucible-warning'  }
      receivers:
        - name: 'crucible-default'
          slack_configs:
            - { channel: '#crucible-alerts', send_resolved: true }
        - name: 'crucible-critical'
          slack_configs:
            - { channel: '#crucible-incidents', send_resolved: true }
          pagerduty_configs:
            - { service_key_file: /etc/secrets/pd-key }
        - name: 'crucible-warning'
          slack_configs:
            - { channel: '#crucible-alerts', send_resolved: true }

loki:
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    storage:
      type: 's3'
      bucketNames:
        chunks: crucible-loki-chunks
        ruler:  crucible-loki-ruler

tempo:
  tempo:
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
