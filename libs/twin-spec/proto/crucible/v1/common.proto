syntax = "proto3";

package crucible.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/crucible/sdk-go/gen/crucible/v1;cruciblev1";

// Glob is a filesystem glob pattern (e.g. "src/**/*.ts").
message Glob {
  string pattern = 1;
}

// Scope narrows a query to a subset of a tenant's resources.
message Scope {
  oneof selector {
    string all = 1;                   // literal "all"
    ScopeFilter filter = 2;
  }
}

message ScopeFilter {
  string repo = 1;
  string file_glob = 2;
  string category = 3;
}

// FileChange is a single mutation in a Diff.
message FileChange {
  string path = 1;
  Action action = 2;
  string content = 3;                  // present for add/modify
  string content_sha256 = 4;
  uint64 size_bytes = 5;

  enum Action {
    ACTION_UNSPECIFIED = 0;
    ACTION_ADD = 1;
    ACTION_MODIFY = 2;
    ACTION_DELETE = 3;
  }
}

// Diff is the cumulative set of changes a task produced in the twin.
message Diff {
  repeated FileChange files = 1;
  string base_sha = 2;
}

// SourceRef tags where a piece of knowledge came from.
message SourceRef {
  oneof kind {
    PrComment pr_comment = 1;
    Incident incident = 2;
    Adr adr = 3;
    AgentObservation agent_observation = 4;
  }

  message PrComment {
    uint64 pr = 1;
    string comment_id = 2;
  }
  message Incident {
    string id = 1;
    string service = 2;
  }
  message Adr {
    string path = 1;
    string commit = 2;
  }
  message AgentObservation {
    string task_id = 1;
    string step_id = 2;
  }
}

// SecretRef is an opaque handle to a secret in the twin's Infisical scope.
// The raw value is never returned to the agent process; the egress proxy
// substitutes it via the `$secret(name)$` placeholder syntax.
message SecretRef {
  string name = 1;
  string handle = 2;                   // opaque
  google.protobuf.Timestamp expires_at = 3;
}

// ExecResult is the response to a non-destructive twin.shell.exec call.
message ExecResult {
  string stdout = 1;
  string stderr = 2;
  int32 exit_code = 3;
  uint64 duration_ms = 4;
  string signed_attestation = 5;       // rekor UUID or local journal ID
}

// BlastRadius scores the impact of a destructive operation.
message BlastRadius {
  repeated string affected_resources = 1;
  Reversibility reversibility = 2;
  double impact_score = 3;             // 0..1

  enum Reversibility {
    REVERSIBILITY_UNSPECIFIED = 0;
    REVERSIBILITY_TRIVIAL = 1;         // git revert
    REVERSIBILITY_SNAPSHOT = 2;        // restore from snapshot
    REVERSIBILITY_LOSSY = 3;           // partial recovery
    REVERSIBILITY_IRREVERSIBLE = 4;    // gone forever
  }
}

// DestructiveProposal is what the syscall shim returns instead of executing
// a destructive command directly.
message DestructiveProposal {
  string task_id = 1;
  string command = 2;
  Scope.ScopeFilter scope = 3;
  BlastRadius blast_radius = 4;
  bool justification_required = 5;
  string intercepted_at_layer = 6;     // "syscall-shim" | "cmd-line-parse" | "ebpf"
  google.protobuf.Timestamp proposed_at = 7;
}

// ExternalEffect describes a side-effect the plan intends to have outside
// the twin's filesystem/db (i.e. live API call, webhook).
message ExternalEffect {
  string service = 1;
  repeated string endpoints = 2;
  bool live = 3;
}

// Risk is a top-of-mind concern surfaced in the plan.
message Risk {
  string description = 1;
  string impact = 2;                   // "low" | "medium" | "high"
}

// Complexity classifies a task for routing.
enum Complexity {
  COMPLEXITY_UNSPECIFIED = 0;
  COMPLEXITY_TRIVIAL = 1;              // typo / rename
  COMPLEXITY_STANDARD = 2;             // multi-file edit, test author
  COMPLEXITY_COMPLEX = 3;              // refactor / new architecture
  COMPLEXITY_CRITICAL = 4;             // @critical path
  COMPLEXITY_MODERNIZATION = 5;        // outcome-tier
}

// ModelTier indexes the 5-tier model router.
enum ModelTier {
  MODEL_TIER_UNSPECIFIED = 0;
  MODEL_TIER_0 = 1;                    // file reads, planning decomposition
  MODEL_TIER_1 = 2;                    // standard coding
  MODEL_TIER_2 = 3;                    // hard refactors, invariants
  MODEL_TIER_3 = 4;                    // verifier (cross-family)
  MODEL_TIER_4 = 5;                    // local / privacy-sensitive
}

// ErrorCode mirrors libs/sdk-*/CrucibleError. Returned in gRPC status details.
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_BUDGET_EXCEEDED = 1;
  ERROR_CODE_RETRY_LIMIT_EXCEEDED = 2;
  ERROR_CODE_WALL_CLOCK_EXCEEDED = 3;
  ERROR_CODE_EGRESS_DENIED = 4;
  ERROR_CODE_SECRET_ACCESS_DENIED = 5;
  ERROR_CODE_DESTRUCTIVE_PROPOSAL_REJECTED = 6;
  ERROR_CODE_TWIN_SETUP_ERROR = 7;
  ERROR_CODE_TAPE_INTEGRITY_ERROR = 8;
  ERROR_CODE_VERIFIER_REJECTION = 9;
  ERROR_CODE_PROMOTION_POLICY_DENIED = 10;
  ERROR_CODE_APPROVAL_TIMEOUT = 11;
  ERROR_CODE_CANARY_ROLLBACK = 12;
  ERROR_CODE_TENANT_QUOTA_EXCEEDED = 13;
  ERROR_CODE_MODEL_ROUTING_DENIED = 14;
}

// CrucibleError is the structured-error contract.
message CrucibleError {
  ErrorCode code = 1;
  string message = 2;
  bool retryable = 3;
  string hint = 4;
  google.protobuf.Struct details = 5;
}
